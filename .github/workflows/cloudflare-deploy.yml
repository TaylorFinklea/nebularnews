name: Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cloudflare-deploy-${{ github.event_name }}-${{ github.event.inputs.target || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test --silent

      - name: Build
        run: npm run build --silent

  deploy-production:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    needs: build-test
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PRODUCTION_BASE_URL: ${{ vars.BASE_URL }}
      PRODUCTION_D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      PRODUCTION_D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
      PRODUCTION_MCP_BASE_URL: ${{ vars.PUBLIC_MCP_BASE_URL }}
      PRODUCTION_MCP_ALLOWED_ORIGINS: ${{ vars.PUBLIC_MCP_ALLOWED_ORIGINS }}
      PRODUCTION_MOBILE_BASE_URL: ${{ vars.PUBLIC_MOBILE_BASE_URL }}
      PRODUCTION_MOBILE_ALLOWED_ORIGINS: ${{ vars.PUBLIC_MOBILE_ALLOWED_ORIGINS }}
      PRODUCTION_MOBILE_OAUTH_CLIENT_ID: ${{ vars.MOBILE_OAUTH_CLIENT_ID }}
      PRODUCTION_MOBILE_OAUTH_CLIENT_NAME: ${{ vars.MOBILE_OAUTH_CLIENT_NAME }}
      PRODUCTION_MOBILE_OAUTH_REDIRECT_URIS: ${{ vars.MOBILE_OAUTH_REDIRECT_URIS }}
    steps:
      - name: Validate required production secrets and vars
        run: |
          missing=0
          for key in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            PRODUCTION_BASE_URL \
            PRODUCTION_D1_DATABASE_NAME \
            PRODUCTION_D1_DATABASE_ID \
            PRODUCTION_MCP_BASE_URL \
            PRODUCTION_MCP_ALLOWED_ORIGINS \
            PRODUCTION_MOBILE_BASE_URL \
            PRODUCTION_MOBILE_ALLOWED_ORIGINS \
            PRODUCTION_MOBILE_OAUTH_CLIENT_ID \
            PRODUCTION_MOBILE_OAUTH_CLIENT_NAME \
            PRODUCTION_MOBILE_OAUTH_REDIRECT_URIS
          do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required production environment value: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Render Wrangler config
        run: npm run render:wrangler

      - name: Export Wrangler config path
        run: echo "WRANGLER_CONFIG_PATH=wrangler.generated.toml" >> "$GITHUB_ENV"

      - name: Run remote migration (production)
        run: npm run migrate:prod

      - name: Build production bundle
        run: npm run build

      - name: Deploy to production (retry transient Cloudflare errors)
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            output_file="$(mktemp)"
            if npx wrangler deploy --env production --config "$WRANGLER_CONFIG_PATH" 2>&1 | tee "$output_file"; then
              exit 0
            fi
            if grep -Eqi '([[:space:]]|^)(50[0-9]|52[0-9]|530)([[:space:]]|$)|malformed response from the API|5[0-9]{2} (Bad Gateway|Service Unavailable|Gateway Timeout)' "$output_file"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 15))
                echo "Transient Cloudflare API error detected, retrying in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                continue
              fi
            fi
            echo "::error::Deploy failed with non-retryable error or retries exhausted."
            exit 1
          done

      - name: Smoke check protected app /api/health
        run: curl -fsSL "$PRODUCTION_BASE_URL/api/health"
        continue-on-error: true

      - name: Smoke check protected app /api/ready
        run: curl -fsSL "$PRODUCTION_BASE_URL/api/ready"
        continue-on-error: true

      - name: Smoke check public MCP protected resource metadata
        run: curl -fsSL "$PRODUCTION_MCP_BASE_URL/.well-known/oauth-protected-resource"

      - name: Smoke check public MCP authorization server metadata
        run: curl -fsSL "$PRODUCTION_MCP_BASE_URL/.well-known/oauth-authorization-server"

      - name: Smoke check public MCP unauthenticated challenge
        run: |
          headers="$(mktemp)"
          curl -sS -D "$headers" -o /dev/null "$PRODUCTION_MCP_BASE_URL/mcp"
          grep -qi '^HTTP/.* 401' "$headers"
          grep -qi "^www-authenticate: Bearer realm=\"nebular-mcp\", resource_metadata=\"${PRODUCTION_MCP_BASE_URL}/.well-known/oauth-protected-resource\"" "$headers"

      - name: Smoke check public mobile /api/health
        run: curl -fsSL "$PRODUCTION_MOBILE_BASE_URL/api/health"

      - name: Smoke check public mobile unauthenticated session
        run: |
          headers="$(mktemp)"
          curl -sS -D "$headers" -o /dev/null "$PRODUCTION_MOBILE_BASE_URL/api/mobile/session"
          grep -qi '^HTTP/.* 401' "$headers"

  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    needs: build-test
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_BASE_URL: ${{ vars.BASE_URL }}
      STAGING_D1_DATABASE_NAME: ${{ vars.D1_DATABASE_NAME }}
      STAGING_D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
    steps:
      - name: Validate required staging secrets and vars
        run: |
          missing=0
          for key in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            STAGING_BASE_URL \
            STAGING_D1_DATABASE_NAME \
            STAGING_D1_DATABASE_ID
          do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required staging environment value: ${key}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Render Wrangler config
        run: npm run render:wrangler

      - name: Export Wrangler config path
        run: echo "WRANGLER_CONFIG_PATH=wrangler.generated.toml" >> "$GITHUB_ENV"

      - name: Run remote migration (staging)
        run: npm run migrate:staging

      - name: Build staging bundle
        run: npm run build

      - name: Deploy to staging (retry transient Cloudflare errors)
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            output_file="$(mktemp)"
            if npx wrangler deploy --env staging --config "$WRANGLER_CONFIG_PATH" 2>&1 | tee "$output_file"; then
              exit 0
            fi
            if grep -Eqi '([[:space:]]|^)(50[0-9]|52[0-9]|530)([[:space:]]|$)|malformed response from the API|5[0-9]{2} (Bad Gateway|Service Unavailable|Gateway Timeout)' "$output_file"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 15))
                echo "Transient Cloudflare API error detected, retrying in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                continue
              fi
            fi
            echo "::error::Deploy failed with non-retryable error or retries exhausted."
            exit 1
          done

      - name: Smoke check staging /api/health
        run: curl -fsSL "$STAGING_BASE_URL/api/health"

      - name: Smoke check staging /api/ready
        run: curl -fsSL "$STAGING_BASE_URL/api/ready"
