name: Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

concurrency:
  group: cloudflare-deploy-${{ github.event_name }}-${{ github.event.inputs.target || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test --silent

      - name: Build
        run: npm run build --silent

  deploy-production:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    needs: build-test
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      PRODUCTION_MCP_BASE_URL: https://mcp.news.finklea.dev
    steps:
      - name: Validate required production secrets
        run: |
          missing=0
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing required secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${PRODUCTION_BASE_URL}" ]; then
            echo "::error::Missing required secret: PRODUCTION_BASE_URL"
            missing=1
          fi
          if [ -z "${PRODUCTION_MCP_BASE_URL}" ]; then
            echo "::error::Missing required setting: PRODUCTION_MCP_BASE_URL"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run remote migration (production)
        run: npm run migrate:prod

      - name: Build production bundle
        run: npm run build

      - name: Deploy to production (retry transient Cloudflare errors)
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            output_file="$(mktemp)"
            if npx wrangler deploy --env production 2>&1 | tee "$output_file"; then
              exit 0
            fi
            if grep -Eqi '([[:space:]]|^)(50[0-9]|52[0-9]|530)([[:space:]]|$)|malformed response from the API|5[0-9]{2} (Bad Gateway|Service Unavailable|Gateway Timeout)' "$output_file"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 15))
                echo "Transient Cloudflare API error detected, retrying in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                continue
              fi
            fi
            echo "::error::Deploy failed with non-retryable error or retries exhausted."
            exit 1
          done

      - name: Smoke check /api/health
        run: curl -fsSL "$PRODUCTION_BASE_URL/api/health"

      - name: Smoke check /api/ready
        run: curl -fsSL "$PRODUCTION_BASE_URL/api/ready"

      - name: Smoke check public MCP protected resource metadata
        run: curl -fsSL "$PRODUCTION_MCP_BASE_URL/.well-known/oauth-protected-resource"

      - name: Smoke check public MCP authorization server metadata
        run: curl -fsSL "$PRODUCTION_MCP_BASE_URL/.well-known/oauth-authorization-server"

      - name: Smoke check public MCP unauthenticated challenge
        run: |
          headers="$(mktemp)"
          curl -sS -D "$headers" -o /dev/null "$PRODUCTION_MCP_BASE_URL/mcp"
          grep -qi '^HTTP/.* 401' "$headers"
          grep -qi '^www-authenticate: Bearer realm="nebular-mcp", resource_metadata="https://mcp.news.finklea.dev/.well-known/oauth-protected-resource"' "$headers"

  deploy-staging:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging'
    runs-on: ubuntu-latest
    needs: build-test
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
    steps:
      - name: Validate required staging secrets
        run: |
          missing=0
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "::error::Missing required secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${STAGING_BASE_URL}" ]; then
            echo "::error::Missing required secret: STAGING_BASE_URL"
            missing=1
          fi
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run remote migration (staging)
        run: npm run migrate:staging

      - name: Build staging bundle
        run: npm run build

      - name: Deploy to staging (retry transient Cloudflare errors)
        run: |
          set -euo pipefail
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Deploy attempt ${attempt}/${max_attempts}"
            output_file="$(mktemp)"
            if npx wrangler deploy --env staging 2>&1 | tee "$output_file"; then
              exit 0
            fi
            if grep -Eqi '([[:space:]]|^)(50[0-9]|52[0-9]|530)([[:space:]]|$)|malformed response from the API|5[0-9]{2} (Bad Gateway|Service Unavailable|Gateway Timeout)' "$output_file"; then
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep_seconds=$((attempt * 15))
                echo "Transient Cloudflare API error detected, retrying in ${sleep_seconds}s..."
                sleep "$sleep_seconds"
                continue
              fi
            fi
            echo "::error::Deploy failed with non-retryable error or retries exhausted."
            exit 1
          done

      - name: Smoke check /api/health
        run: curl -fsSL "$STAGING_BASE_URL/api/health"

      - name: Smoke check /api/ready
        run: curl -fsSL "$STAGING_BASE_URL/api/ready"
