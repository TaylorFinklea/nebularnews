name = "nebular-news"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "nebular-news-dev"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[vars]
APP_ENV = "development"
DEFAULT_PROVIDER = "anthropic"
DEFAULT_MODEL_A = "claude-haiku-4-5-20251001"
DEFAULT_MODEL_B = "claude-sonnet-4-6"
MAX_FEEDS_PER_POLL = "12"
MAX_ITEMS_PER_POLL = "120"
APNS_KEY_ID = "R9GNGC6U6N"
APNS_TEAM_ID = "K7CBQW6MPG"
APNS_BUNDLE_ID = "com.nebularnews.ios"
APNS_SANDBOX = "true"

# ── Staging ──────────────────────────────────────────────────────────────────

[env.staging]
name = "nebular-news-staging"

[env.staging.triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "nebular-news-staging"
database_id = "__STAGING_D1_DATABASE_ID__"
migrations_dir = "migrations"

[env.staging.vars]
APP_ENV = "staging"
DEFAULT_PROVIDER = "anthropic"
DEFAULT_MODEL_A = "claude-haiku-4-5-20251001"
DEFAULT_MODEL_B = "claude-sonnet-4-6"
MAX_FEEDS_PER_POLL = "12"
MAX_ITEMS_PER_POLL = "120"
APNS_KEY_ID = "R9GNGC6U6N"
APNS_TEAM_ID = "K7CBQW6MPG"
APNS_BUNDLE_ID = "com.nebularnews.ios"
APNS_SANDBOX = "true"

# ── Production ───────────────────────────────────────────────────────────────

[env.production]
name = "nebular-news"
routes = [
  { pattern = "api.nebularnews.com", custom_domain = true }
]

[env.production.triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "nebular-news-prod"
database_id = "__PRODUCTION_D1_DATABASE_ID__"
migrations_dir = "migrations"

[env.production.vars]
APP_ENV = "production"
DEFAULT_PROVIDER = "anthropic"
DEFAULT_MODEL_A = "claude-haiku-4-5-20251001"
DEFAULT_MODEL_B = "claude-sonnet-4-6"
MAX_FEEDS_PER_POLL = "8"
MAX_ITEMS_PER_POLL = "60"
APNS_KEY_ID = "R9GNGC6U6N"
APNS_TEAM_ID = "K7CBQW6MPG"
APNS_BUNDLE_ID = "com.nebularnews.ios"
APNS_SANDBOX = "false"
