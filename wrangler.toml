name = "nebular-news"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "nebular-news-dev"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2_FALLBACK"
bucket_name = "nebularnews-fallback-images"

[vars]
APP_ENV = "development"
MAX_FEEDS_PER_POLL = "12"
MAX_ITEMS_PER_POLL = "120"

# ── Staging ──────────────────────────────────────────────────────────────────

[env.staging]
name = "nebular-news-staging"

[env.staging.triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[env.staging.d1_databases]]
binding = "DB"
database_name = "nebular-news-staging"
database_id = "__STAGING_D1_DATABASE_ID__"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "R2_FALLBACK"
bucket_name = "nebularnews-fallback-images"

[env.staging.vars]
APP_ENV = "staging"
MAX_FEEDS_PER_POLL = "12"
MAX_ITEMS_PER_POLL = "120"

# ── Production ───────────────────────────────────────────────────────────────

[env.production]
name = "nebular-news"
routes = [{ pattern = "api.nebularnews.com", custom_domain = true }]

[env.production.triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "nebular-news-prod"
database_id = "140afce3-88f1-445d-9cff-652ed1bfc967"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "R2_FALLBACK"
bucket_name = "nebularnews-fallback-images"

[env.production.vars]
APP_ENV = "production"
MAX_FEEDS_PER_POLL = "8"
MAX_ITEMS_PER_POLL = "60"
