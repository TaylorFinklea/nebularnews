APNS_TEAM_ID = "K7CBQW6MPG"
APNS_BUNDLE_ID = "com.nebularnews.ios"
APNS_SANDBOX = "true"

[env.production]
name = "nebular-news"

[env.production.triggers]
crons = ["*/5 * * * *", "0 * * * *", "30 3 * * *"]

[[env.production.d1_databases]]
binding = "DB"
database_name = "__PRODUCTION_D1_DATABASE_NAME__"
